# Do NOT commit real values. Use `kubectl create secret` or a secrets manager.
apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secrets
  namespace: url-shortener
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@postgres:5432/urlshortener"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "change-me-strong-secret"
  ADMIN_JWT_SECRET: "change-me-admin-secret"
