name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─── Typecheck all services ─────────────────────────────────────
  typecheck:
    name: Typecheck ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - url-service
          - redirect-service
          - analytics-service
          - qr-service
          - admin-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: services/${{ matrix.service }}

  # ─── Build & push Docker images (main branch only) ─────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        service:
          - auth-service
          - url-service
          - redirect-service
          - analytics-service
          - qr-service
          - admin-service
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to staging (main branch) ───────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig.yaml

      - name: Deploy
        env:
          KUBECONFIG: kubeconfig.yaml
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          for svc in auth-service url-service redirect-service analytics-service qr-service admin-service; do
            kubectl set image deployment/$svc $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:$IMAGE_TAG \
              -n url-shortener --kubeconfig kubeconfig.yaml
          done
          kubectl rollout status deployment/redirect-service -n url-shortener --timeout=120s
