global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:3001"]
    metrics_path: /metrics

  - job_name: url-service
    static_configs:
      - targets: ["url-service:3002"]
    metrics_path: /metrics

  - job_name: redirect-service
    static_configs:
      - targets: ["redirect-service:3006"]
    metrics_path: /metrics

  - job_name: analytics-service
    static_configs:
      - targets: ["analytics-service:3003"]
    metrics_path: /metrics

  - job_name: qr-service
    static_configs:
      - targets: ["qr-service:3004"]
    metrics_path: /metrics

  - job_name: admin-service
    static_configs:
      - targets: ["admin-service:3005"]
    metrics_path: /metrics
