apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: url-shortener
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/limit-rps: "200"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - your-domain.com
      secretName: url-shortener-tls
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/v1/urls
            pathType: Prefix
            backend:
              service:
                name: url-service
                port:
                  number: 3002
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3003
          - path: /api/v1/qr
            pathType: Prefix
            backend:
              service:
                name: qr-service
                port:
                  number: 3004
          - path: /api/v1/admin
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 3005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redirect-service
                port:
                  number: 3006
