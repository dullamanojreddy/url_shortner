worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" $request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=redirect:10m rate=200r/m;

  upstream auth_service      { server auth-service:3001; }
  upstream url_service       { server url-service:3002; }
  upstream analytics_service { server analytics-service:3003; }
  upstream qr_service        { server qr-service:3004; }
  upstream admin_service     { server admin-service:3005; }
  upstream redirect_service  { server redirect-service:3006; }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Auth ────────────────────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── URL CRUD ─────────────────────────────────────────────────
    location /api/v1/urls {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://url_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Analytics ────────────────────────────────────────────────
    location /api/v1/analytics {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://analytics_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── QR Codes ─────────────────────────────────────────────────
    location /api/v1/qr/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://qr_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Admin ─────────────────────────────────────────────────────
    location /api/v1/admin/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://admin_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Redirect (catch-all) ──────────────────────────────────────
    location / {
      limit_req zone=redirect burst=50 nodelay;
      proxy_pass http://redirect_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
